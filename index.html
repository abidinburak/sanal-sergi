<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sanal Sergi</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#f3f3f3;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .bar{
      position:fixed; top:12px; left:12px; right:12px;
      display:flex; justify-content:space-between; gap:10px; z-index:9;
      pointer-events:none;
    }
    .title{
      background:rgba(255,255,255,.92); padding:10px 12px; border-radius:12px;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
      pointer-events:none;
      max-width:70vw;
    }
    .title b{display:block;font-size:14px}
    .title span{display:block;font-size:12px;opacity:.7;margin-top:2px}
    .chip{
      background:rgba(255,255,255,.92); padding:8px 10px; border-radius:999px;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
      font-size:12px; height:fit-content;
    }
    .controls{
      position:fixed; left:0; right:0; bottom:18px; z-index:9;
      display:flex; justify-content:center; gap:12px;
      pointer-events:auto;
    }
    button{
      border:0; border-radius:14px;
      padding:12px 16px; font-weight:800;
      background:rgba(255,255,255,.95);
      box-shadow:0 8px 20px rgba(0,0,0,.12);
      cursor:pointer;
    }
    button:active{transform:translateY(1px)}
    .loading{
      position:fixed; inset:0; display:none;
      align-items:center; justify-content:center;
      background:rgba(243,243,243,.65); backdrop-filter: blur(2px);
      font-weight:900; z-index:10;
    }
    .loading.show{display:flex}
  </style>
</head>

<body>
  <div class="bar">
    <div class="title">
      <b id="name">Ürün</b>
      <span>⬅ / ➡ butonlarıyla geçiş</span>
    </div>
    <div class="chip" id="count">1 / 1</div>
  </div>

  <div class="controls">
    <button id="prev">⬅ Sol</button>
    <button id="next">Sağ ➡</button>
  </div>

  <div class="loading" id="loading">Yükleniyor…</div>

  <a-scene
    background="color:#f3f3f3"
    renderer="colorManagement:true; physicallyCorrectLights:true; antialias:true;"
    loading-screen="enabled:false">

    <!-- Studio lights -->
    <a-entity light="type: ambient; intensity: 0.95"></a-entity>
    <a-entity light="type: directional; intensity: 1.1" position="2 4 3"></a-entity>
    <a-entity light="type: directional; intensity: 0.6" position="-2 3 -2"></a-entity>

    <!-- Floor -->
    <a-plane rotation="-90 0 0" width="60" height="60" color="#ffffff"></a-plane>

    <!-- Camera -->
    <a-entity id="cameraRig">
      <a-entity id="cam" camera position="0 1.6 3"></a-entity>
    </a-entity>

    <!-- Model -->
    <a-entity id="rig" position="0 0 -2">
      <a-gltf-model id="model" visible="false"></a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    // ✅ Ürünler buraya:
    const BASE = "https://www.baskitasarim.net/models/";
    const PRODUCTS = [
      { name: "Çanakkale", url: BASE + "canakkale.glb" },
      // { name: "Ürün 2", url: BASE + "urun2.glb" },
      // ...
    ];

    const nameEl = document.getElementById("name");
    const countEl = document.getElementById("count");
    const loadingEl = document.getElementById("loading");

    const modelEl = document.querySelector("#model");
    const camEl = document.querySelector("#cam");
    const rigEl = document.querySelector("#rig");

    let idx = 0;

    function showLoading(on){ loadingEl.classList.toggle("show", !!on); }

    function ui(){
      nameEl.textContent = PRODUCTS[idx]?.name ?? "Ürün";
      countEl.textContent = `${idx+1} / ${PRODUCTS.length}`;
    }

    // 🧠 Modeli ekrana “büyük” sığdır (otomatik)
    function fitToScreen(obj){
      const box = new THREE.Box3().setFromObject(obj);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      // Modeli merkeze taşı
      obj.position.sub(center);

      // Ölçekle
      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const target = 2.2;                 // ekranda ne kadar büyük görünsün
      const scale = target / maxDim;
      obj.scale.setScalar(scale);

      // Kamerayı ayarla (yakın/uzak)
      const z = 3;                        // genelde ideal başlangıç
      camEl.setAttribute("position", `0 1.6 ${z}`);
    }

    function load(i){
      idx = (i + PRODUCTS.length) % PRODUCTS.length;
      ui();
      showLoading(true);

      modelEl.setAttribute("visible", "false");
      modelEl.setAttribute("src", PRODUCTS[idx].url);

      // her yüklemede rig rotasyon sıfır
      rigEl.setAttribute("rotation", "0 0 0");

      const onLoaded = () => {
        const obj = modelEl.getObject3D("mesh");
        if (obj) fitToScreen(obj);
        modelEl.setAttribute("visible", "true");
        showLoading(false);
        modelEl.removeEventListener("model-loaded", onLoaded);
      };
      const onError = (e) => {
        console.error("Model yüklenemedi:", PRODUCTS[idx].url, e);
        showLoading(false);
        modelEl.removeEventListener("model-error", onError);
      };

      modelEl.addEventListener("model-loaded", onLoaded);
      modelEl.addEventListener("model-error", onError);
    }

    document.getElementById("prev").onclick = () => load(idx - 1);
    document.getElementById("next").onclick = () => load(idx + 1);

    // Klavye okları da çalışsın
    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") load(idx - 1);
      if (e.key === "ArrowRight") load(idx + 1);
    });

    ui();
    load(0);
  </script>
</body>
</html>
